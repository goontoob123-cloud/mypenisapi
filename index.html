<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jikoutils</title>

<style>
:root {
    --blur: blur(14px);
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.12);
    --border: rgba(255,255,255,0.12);
    --text: #e8faff;
    --dim: #9fbcc3;
    --accent: #4fd0e0;
    --mono: 'Consolas', monospace;
    --sans: system-ui;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:var(--sans);
    color:var(--text);
    background:url("https://files.catbox.moe/4if13j.png") center/cover no-repeat fixed;
    min-height:100vh;
}

/* dark overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    z-index:0;
}

.Container{
    max-width:720px;
    margin:0 auto;
    padding:40px 20px 80px;
    position:relative;
    z-index:1;
}

/* TOP TAB BAR */
.TopBar{
    width:220px;
    margin:0 auto 40px;
    padding:10px;
    text-align:center;
    border-radius:999px;
    background:var(--glass);
    backdrop-filter:var(--blur);
    border:1px solid var(--border);
    font-family:var(--mono);
    letter-spacing:0.1em;
    font-size:0.75rem;
}

/* cards */
.SectionLabel{
    font-family:var(--mono);
    font-size:0.65rem;
    color:var(--dim);
    margin:28px 0 10px;
    text-transform:uppercase;
}

.EndpointCard{
    background:var(--glass);
    backdrop-filter:var(--blur);
    border:1px solid var(--border);
    border-radius:14px;
    margin-bottom:20px;
    overflow:hidden;
}

.EndpointCard-head{
    padding:16px;
}

.EndpointCard-meta{
    display:flex;
    gap:8px;
    margin-bottom:6px;
}

.MethodBadge{
    font-family:var(--mono);
    font-size:0.6rem;
    padding:3px 8px;
    border-radius:999px;
    background:var(--glass-strong);
}

.EndpointPath{
    font-family:var(--mono);
    font-size:0.85rem;
}

.EndpointDesc{
    font-size:0.75rem;
    color:var(--dim);
}

/* input */
.TryIt{
    padding:14px;
    border-top:1px solid var(--border);
}

input{
    width:100%;
    padding:8px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--glass);
    backdrop-filter:var(--blur);
    color:var(--text);
    font-family:var(--mono);
}

button{
    margin-top:10px;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background:var(--glass);
    backdrop-filter:var(--blur);
    color:var(--text);
    cursor:pointer;
}

.ResponseBox{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(0,0,0,0.4);
    font-family:var(--mono);
    font-size:0.75rem;
    display:none;
}

.ResponseBox.IsVisible{
    display:block;
}
</style>
</head>

<body>

<div class="Container">

    <div class="TopBar">meta utils</div>

    <!-- ACCOUNTS -->
    <div class="SectionLabel">accounts</div>
    <div class="EndpointCard">
        <div class="EndpointCard-head">
            <div class="EndpointCard-meta">
                <span class="MethodBadge">GET</span>
                <span class="EndpointPath">/api/accounts/stock</span>
            </div>
            <div class="EndpointDesc">check available account stock</div>
        </div>
        <div class="TryIt">
            <button onclick="FetchStock()">evaluate</button>
            <div id="StockResponse" class="ResponseBox"></div>
        </div>
    </div>

    <!-- NONCE -->
    <div class="SectionLabel">apps · nonce</div>
    <div class="EndpointCard">
        <div class="EndpointCard-head">
            <div class="EndpointCard-meta">
                <span class="MethodBadge">POST</span>
                <span class="EndpointPath">/api/apps/gen_nonce</span>
            </div>
            <div class="EndpointDesc">generate nonce</div>
        </div>
        <div class="TryIt">
            <input id="AccessTokenNonce" placeholder="access token">
            <button onclick="FetchLiveNonce()">evaluate</button>
            <div id="NonceResponse" class="ResponseBox"></div>
        </div>
    </div>

    <!-- ME -->
    <div class="SectionLabel">apps · identity</div>
    <div class="EndpointCard">
        <div class="EndpointCard-head">
            <div class="EndpointCard-meta">
                <span class="MethodBadge">GET</span>
                <span class="EndpointPath">/api/apps/get_me</span>
            </div>
            <div class="EndpointDesc">get user id</div>
        </div>
        <div class="TryIt">
            <input id="AccessTokenMe" placeholder="access token">
            <button onclick="FetchLiveMe()">evaluate</button>
            <div id="MeResponse" class="ResponseBox"></div>
        </div>
    </div>

</div>

<script>
function show(box, data){
    box.classList.add("IsVisible");
    box.innerText = JSON.stringify(data,null,2);
}

function FetchStock(){
    show(document.getElementById("StockResponse"), {stock:1,status:"GOOD"});
}

function FetchLiveNonce(){
    const token=document.getElementById("AccessTokenNonce").value.trim();
    const box=document.getElementById("NonceResponse");

    if(!token) return show(box,{error:"token required"});

    fetch(`https://graph.oculus.com/user_nonce_generate?access_token=${encodeURIComponent(token)}`,{method:"POST"})
    .then(r=>r.json())
    .then(d=>show(box,d))
    .catch(e=>show(box,{error:e.message}));
}

function FetchLiveMe(){
    const token=document.getElementById("AccessTokenMe").value.trim();
    const box=document.getElementById("MeResponse");

    if(!token) return show(box,{error:"token required"});

    fetch(`https://graph.oculus.com/me?access_token=${encodeURIComponent(token)}`)
    .then(r=>r.json())
    .then(d=>show(box,d))
    .catch(e=>show(box,{error:e.message}));
}
</script>

</body>
</html>
